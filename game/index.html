<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CORE BREACH</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:#05070a; height:100%; overflow:hidden;
    font-family:'Consolas','Courier New',monospace; color:#9fe8ff;
  }
  #wrap {
    position:fixed; inset:0; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  #stage {
    position:relative; display:flex; align-items:center; justify-content:center;
    width:100%; height:100%;
  }
  canvas { display:block; background:#0a0e14; }
  #overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; pointer-events:none; color:#bff3ff; overflow:auto;
  }
  #overlay h1 { font-size:42px; letter-spacing:6px; color:#4de8ff; text-shadow:0 0 18px #2ce8ff; }
  #overlay h2 { font-size:22px; letter-spacing:3px; margin-top:10px; color:#ff5d6c; text-shadow:0 0 12px #ff3040; }
  #overlay p { font-size:14px; margin-top:14px; line-height:1.6; color:#7fd8ee; max-width:640px; }
  #overlay .hint { margin-top:24px; font-size:13px; color:#5fa; opacity:0.85; }
  .cards { display:flex; gap:18px; justify-content:center; margin-top:20px; pointer-events:auto; }
  .card {
    width:190px; min-height:170px; border:2px solid #2ce8ff; border-radius:8px;
    background:#0d1622ee; padding:12px; cursor:pointer; transition:transform .1s, background .15s;
    pointer-events:auto; display:flex; flex-direction:column; align-items:center;
  }
  .card:hover { background:#16324a; transform:translateY(-4px); border-color:#7ff; }
  .card .cardIcon {
    width:64px; height:64px; margin-bottom:8px;
    filter:drop-shadow(0 0 6px #2ce8ff);
  }
  .card h3 { color:#ffe15d; font-size:15px; margin-bottom:8px; letter-spacing:1px; }
  .card p { font-size:12px; color:#bfeaff; line-height:1.4; max-width:none; }
  .card .key { color:#5fa; font-size:11px; margin-top:8px; display:block; }
  #hud {
    position:absolute; top:16px; left:16px; right:16px; display:flex; justify-content:space-between;
    font-size:13px; pointer-events:none; text-shadow:0 0 6px #000;
  }
  #hpBarOuter, #dashBarOuter { width:220px; height:14px; border:1px solid #2ce8ff; background:#04121a; margin-top:4px; }
  #hpBarInner { height:100%; background:linear-gradient(90deg,#ff3050,#ff8a3d); width:100%; }
  #dashBarInner { height:100%; background:linear-gradient(90deg,#2ce8ff,#7fffb0); width:100%; }
  #upgradeList { font-size:12px; color:#8fe; text-align:right; max-width:260px; line-height:1.5; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="c" width="900" height="600"></canvas>
    <div id="hud">
      <div>
        <div>UNIT-7 // INTEGRITY</div>
        <div id="hpBarOuter"><div id="hpBarInner"></div></div>
        <div style="margin-top:6px;">DASH</div>
        <div id="dashBarOuter"><div id="dashBarInner"></div></div>
      </div>
      <div style="text-align:right;">
        <div id="floorLabel">SECTOR 1</div>
        <div id="upgradeList"></div>
      </div>
    </div>
    <div id="overlay"></div>
  </div>
</div>

<script>
(function(){
"use strict";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width, H = canvas.height;

// Matches the canvas's CSS transform scale (1 = flat, no tilt) so movement
// bounds stay lined up with whatever is actually visible on screen.
const TILT_SCALE = 1;
function sideMargin(){ return W * (1 - 1/TILT_SCALE) / 2; }
const overlay = document.getElementById('overlay');
const hpBarInner = document.getElementById('hpBarInner');
const dashBarInner = document.getElementById('dashBarInner');
const floorLabel = document.getElementById('floorLabel');
const upgradeListEl = document.getElementById('upgradeList');

// ---------- input ----------
const keys = {};
const mouse = { x: W/2, y: H/2, down: false };
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', e => {
  // offsetX/offsetY are hit-tested in the canvas's own local box, so they stay
  // correct even though the canvas is now tilted in 3D via CSS transform.
  mouse.x = e.offsetX * (canvas.width / canvas.clientWidth);
  mouse.y = e.offsetY * (canvas.height / canvas.clientHeight);
});
canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup', () => mouse.down = false);
window.addEventListener('keydown', e => {
  if (state.mode === 'title' && (e.key === 'Enter' || e.key === ' ')) { Audio8.ensureCtx(); Audio8.startMusic(); startRun(); }
  if (state.mode === 'gameover' && e.key.toLowerCase() === 'r') startRun();
  if (state.mode === 'upgrade') {
    if (e.key === '1') pickUpgrade(0);
    if (e.key === '2') pickUpgrade(1);
    if (e.key === '3') pickUpgrade(2);
  }
  if (e.key.toLowerCase() === 'm') Audio8.toggleMusic();
  if (e.key.toLowerCase() === 'n') Audio8.toggleSfx();
});
canvas.addEventListener('click', () => {
  if (state.mode === 'title') { Audio8.ensureCtx(); Audio8.startMusic(); startRun(); }
});

// ---------- helpers ----------
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }
function rand(a,b){ return a + Math.random()*(b-a); }
function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function toRoman(num){
  const vals = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
  let res = '';
  for (const [v,sym] of vals){ while(num>=v){ res+=sym; num-=v; } }
  return res;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ---------- 8-bit audio engine ----------
const Audio8 = (function(){
  let ctx = null, masterGain, musicGain, sfxGain;
  let musicOn = true, sfxOn = true;
  let musicTimer = null, nextNoteTime = 0, step = 0;

  function ensureCtx(){
    if (!ctx){
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain(); masterGain.gain.value = 0.6; masterGain.connect(ctx.destination);
      musicGain = ctx.createGain(); musicGain.gain.value = 0.32; musicGain.connect(masterGain);
      sfxGain = ctx.createGain(); sfxGain.gain.value = 0.85; sfxGain.connect(masterGain);
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function tone(freq, dur, type, vol, dest, startAt, sweepTo){
    const c = ensureCtx();
    const t0 = startAt !== undefined ? startAt : c.currentTime;
    const osc = c.createOscillator();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t0);
    if (sweepTo !== undefined) osc.frequency.exponentialRampToValueAtTime(Math.max(20,sweepTo), t0+dur);
    const g = c.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol!==undefined?vol:0.3, t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(dest||sfxGain);
    osc.start(t0); osc.stop(t0+dur+0.02);
  }

  function noiseBurst(dur, vol, filterFreq, dest, startAt){
    const c = ensureCtx();
    const t0 = startAt !== undefined ? startAt : c.currentTime;
    const size = Math.max(1, Math.floor(c.sampleRate*dur));
    const buffer = c.createBuffer(1, size, c.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i=0;i<size;i++) data[i] = Math.random()*2-1;
    const src = c.createBufferSource(); src.buffer = buffer;
    const g = c.createGain();
    g.gain.setValueAtTime(vol!==undefined?vol:0.3, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    if (filterFreq){
      const f = c.createBiquadFilter(); f.type='lowpass'; f.frequency.value = filterFreq;
      src.connect(f); f.connect(g);
    } else src.connect(g);
    g.connect(dest||sfxGain);
    src.start(t0);
  }

  // ---- sfx ----
  const sfx = {
    playerShoot(){ if (sfxOn) tone(880, 0.07, 'square', 0.18, sfxGain, undefined, 660); },
    soldierShoot(){ if (sfxOn) tone(340, 0.09, 'sawtooth', 0.15, sfxGain, undefined, 220); },
    tankShoot(){ if (sfxOn){ tone(140, 0.16, 'triangle', 0.24, sfxGain, undefined, 70); noiseBurst(0.07, 0.1, 900, sfxGain); } },
    turretLaunch(){ if (sfxOn) tone(220, 0.3, 'square', 0.14, sfxGain, undefined, 640); },
    bossShoot(){ if (sfxOn) tone(160, 0.2, 'sawtooth', 0.2, sfxGain, undefined, 90); },
    hit(){ if (sfxOn) noiseBurst(0.045, 0.1, 3200, sfxGain); },
    explosion(){ if (sfxOn){ noiseBurst(0.35, 0.28, 1200, sfxGain); tone(180, 0.3, 'square', 0.16, sfxGain, undefined, 40); } },
    playerHurt(){ if (sfxOn) tone(140, 0.18, 'sawtooth', 0.22, sfxGain, undefined, 60); },
    dash(){ if (sfxOn) tone(300, 0.15, 'square', 0.16, sfxGain, undefined, 900); },
    upgrade(){
      if (!sfxOn) return;
      const c = ensureCtx(), t0 = c.currentTime;
      [523.25,659.25,783.99,1046.5].forEach((f,i)=> tone(f, 0.13, 'square', 0.18, sfxGain, t0+i*0.07));
    },
    ui(){ if (sfxOn) tone(600, 0.06, 'square', 0.13, sfxGain); },
  };

  // ---- music: two-bar chiptune loop, lookahead scheduler ----
  const BPM = 132;
  const stepDur = 60/BPM/2;
  const bassPattern = [110,110,130.81,110, 98,98,116.54,98];
  const leadPattern = [440,0,523.25,0, 587.33,0,523.25,0, 440,0,392,0, 349.23,0,392,0];

  function scheduleMusic(){
    const c = ensureCtx();
    if (musicOn){
      while (nextNoteTime < c.currentTime + 0.2){
        tone(bassPattern[step % bassPattern.length], stepDur*0.9, 'triangle', 0.13, musicGain, nextNoteTime);
        const lead = leadPattern[step % leadPattern.length];
        if (lead) tone(lead, stepDur*0.85, 'square', 0.08, musicGain, nextNoteTime);
        nextNoteTime += stepDur;
        step++;
      }
    }
    musicTimer = setTimeout(scheduleMusic, 50);
  }

  function startMusic(){
    ensureCtx();
    if (musicTimer) return;
    nextNoteTime = ctx.currentTime + 0.1;
    step = 0;
    scheduleMusic();
  }

  function toggleMusic(){ musicOn = !musicOn; return musicOn; }
  function toggleSfx(){ sfxOn = !sfxOn; return sfxOn; }

  return { ensureCtx, startMusic, toggleMusic, toggleSfx, sfx,
    isMusicOn(){ return musicOn; }, isSfxOn(){ return sfxOn; } };
})();

// ---------- game state ----------
const BOSS_INTERVAL = 10;
let state = {
  mode: 'title', // title, story, playing, upgrade, gameover
  sector: 1,
  bossesDefeated: 0,
  pendingUpgrades: [],
  storyTimer: 0,
  storyText: '',
};

let player, bullets, enemyBullets, enemies, particles, roomCleared, floorMsgTimer;

function makePlayer(){
  return {
    x: W/2, y: H/2, radius: 22.5,
    speed: 230,
    hp: 100, maxHp: 100,
    damage: 12,
    fireCooldown: 260, lastShot: -9999,
    multishot: 1,
    pierce: 0,
    armor: 0,
    dashSpeed: 780, dashDuration: 140, dashCooldown: 1600,
    dashTimer: 0, dashCooldownTimer: 0,
    invuln: 0,
    facing: 0,
    animT: 0,
    moving: false,
    critChance: 0, critMult: 2,
    ricochet: 0,
    lifesteal: 0,
    regen: 0,
    bulletSpeedMult: 1,
    spreadMult: 1,
    homingTurn: 0,
    hasRevive: false,
    upgrades: [],
  };
}

function resetRun(){
  player = makePlayer();
  bullets = [];
  enemyBullets = [];
  enemies = [];
  particles = [];
  state.sector = 1;
  state.bossesDefeated = 0;
  state.pendingUpgrades = [];
  updateUpgradeList();
}

function startRun(){
  resetRun();
  enterStory(1);
}

const SECTOR_NAMES = [
  ["CONTAINMENT WING", "Alarms blaring. Guards inbound. RUN."],
  ["SECURITY CHECKPOINT", "Armed soldiers hold the corridor."],
  ["MOTOR POOL", "Armored units detected. Heavy resistance."],
  ["MISSILE SILO ACCESS", "Automated turrets online."],
  ["DEEP STORAGE", "Everything they have is coming for you."],
  ["REACTOR CORE", "Systems destabilizing. Push forward."],
  ["RESEARCH WING", "Failed experiments stir in the dark."],
  ["COMMAND DECK", "Officers scrambling to seal the exits."],
  ["POWER RELAY", "Overload risk climbing with every step."],
];

const OUTDOOR_SECTOR_NAMES = [
  ["PERIMETER FENCE", "Razor wire and search lights ahead."],
  ["MOTOR YARD", "Vehicles idle across the open lot."],
  ["LOADING DOCKS", "Stacked containers offer little cover."],
  ["TREELINE", "Forest edge, patrols moving through the brush."],
  ["SUPPLY DEPOT", "Reinforcements pouring out into the open."],
  ["RIVER CROSSING", "The only bridge out is heavily guarded."],
  ["COMMS ARRAY", "Antenna towers hum with signal traffic."],
  ["QUARRY", "Open ground. Nowhere left to hide."],
  ["OUTER WALL", "The wall marks the edge of their control."],
];

function isBossSector(sector){ return sector % BOSS_INTERVAL === 0; }

function getSectorText(sector){
  if (sector === BOSS_INTERVAL+1){
    return ["SECTOR " + sector + " // PERIMETER BREACH", "You've broken through to the surface. Open ground ahead."];
  }
  if (isBossSector(sector)){
    const bossIndex = sector / BOSS_INTERVAL;
    const label = bossIndex === 1 ? "THE WARDEN" : `THE WARDEN ${toRoman(bossIndex)}`;
    if (isOutdoor(sector)){
      return [`SECTOR ${sector} // OPEN FIELD PURSUIT`, `${label} has caught up with you in the open.`];
    }
    return [`SECTOR ${sector} // OVERSEER CORE`, `${label} blocks your escape.`];
  }
  const outdoor = isOutdoor(sector);
  const names = outdoor ? OUTDOOR_SECTOR_NAMES : SECTOR_NAMES;
  const base = outdoor ? BOSS_INTERVAL+2 : 1;
  const idx = (sector-base) % names.length;
  const cycle = Math.floor((sector-base) / names.length);
  const [name, line] = names[idx];
  const suffix = cycle > 0 ? ` (DEPTH ${cycle+1})` : '';
  return [`SECTOR ${sector} // ${name}${suffix}`, line];
}

function enterStory(sector){
  state.mode = 'story';
  state.sector = sector;
  state.storyTimer = 1900;
  state.storyText = getSectorText(sector);
  floorLabel.textContent = isBossSector(sector) ? `SECTOR ${sector} — BOSS` : `SECTOR ${sector}`;
}

function beginSector(){
  state.mode = 'playing';
  bullets = []; enemyBullets = []; particles = [];
  player.x = W/2; player.y = H - 80;
  roomCleared = false;
  spawnRoom(state.sector);
}

function spawnRoom(sector){
  enemies = [];
  if (isBossSector(sector)){
    const bossIndex = sector / BOSS_INTERVAL;
    const bossScale = 1 + (bossIndex-1)*0.55;
    enemies.push({
      type:'boss', x: W/2, y: 130, radius: 57.5,
      hp: 990*bossScale, maxHp: 990*bossScale,
      speed: 60 + (bossIndex-1)*6, lastShot: -9999, shootCooldown: Math.max(450, 900-(bossIndex-1)*40),
      phaseTimer: 0, spawnCooldown: Math.max(2200, 4200-(bossIndex-1)*200), lastSpawn: -9999,
      color:'#ff2d55'
    });
    return;
  }
  const count = clamp(2 + Math.floor(sector * 0.8), 3, 16);
  for (let i=0;i<count;i++){
    let type;
    const roll = Math.random();
    if (sector <= 2) type = 'soldier';
    else if (sector <= 4) type = roll < 0.65 ? 'soldier' : 'tank';
    else type = roll < 0.45 ? 'soldier' : (roll < 0.75 ? 'tank' : 'turret');
    enemies.push(makeEnemy(type, sector));
  }
}

function enemyHealthScale(sector){
  let scale = 1;
  for (let i=2; i<=sector; i++){
    const decade = Math.floor((i-1)/10);
    const rate = 0.10 * Math.pow(2, decade);
    scale *= (1 + rate);
  }
  return scale;
}

function enemyDamageScale(sector){
  return Math.pow(1.10, sector-1);
}

function makeEnemy(type, sector){
  const scale = enemyHealthScale(sector);
  const m = sideMargin();
  const spawnX = rand(m+60, W-m-60);
  const spawnY = rand(60, H*0.5);
  if (type === 'soldier'){
    return { type, x:spawnX, y:spawnY, radius:17.5, hp: 30.8*scale, maxHp: 30.8*scale,
      speed: 120, lastShot: -9999, shootCooldown: rand(900,1300), color:'#ff8a3d' };
  }
  if (type === 'tank'){
    return { type, x:spawnX, y:spawnY, radius:30, hp: 99*scale, maxHp: 99*scale,
      speed: 55, lastShot: -9999, shootCooldown: rand(1800,2200), color:'#3dd66b' };
  }
  // turret (missile)
  return { type, x:spawnX, y:spawnY, radius:22.5, hp: 44*scale, maxHp: 44*scale,
    speed: 0, lastShot: -9999, shootCooldown: rand(2200,2700), color:'#c56bff' };
}

// ---------- upgrades ----------
const UPGRADE_POOL = [
  { key:'damage', cat:'offense', name:'OVERCHARGE ROUNDS', desc:'+35% weapon damage', apply:p=>p.damage*=1.35 },
  { key:'firerate', cat:'offense', name:'RAPID CYCLER', desc:'-20% shot cooldown', apply:p=>p.fireCooldown*=0.8 },
  { key:'maxhp', cat:'defense', name:'REINFORCED PLATING', desc:'+100 max integrity first time, +15% each time after', apply:p=>{const gain=p.upgrades.includes('REINFORCED PLATING')?p.maxHp*0.15:100;p.maxHp+=gain;p.hp=Math.min(p.maxHp,p.hp+gain);} },
  { key:'speed', cat:'utility', name:'SERVO BOOST', desc:'+18% movement speed', apply:p=>p.speed*=1.18 },
  { key:'multishot', cat:'offense', name:'TWIN EMITTER', desc:'+1 projectile per shot', apply:p=>p.multishot+=1 },
  { key:'dash', cat:'utility', name:'CAPACITOR TUNING', desc:'-25% dash cooldown', apply:p=>p.dashCooldown*=0.75 },
  { key:'armor', cat:'defense', name:'ABLATIVE ARMOR', desc:'-15% damage taken', apply:p=>p.armor=1-(1-p.armor)*0.85 },
  { key:'pierce', cat:'offense', name:'PENETRATOR CORE', desc:'Shots pierce +1 enemy', apply:p=>p.pierce+=1 },
  { key:'heal', cat:'defense', name:'NANITE REPAIR', desc:'Restore 40 integrity', apply:p=>p.hp=Math.min(p.maxHp,p.hp+40) },
  { key:'crit', cat:'offense', name:'CRITICAL OVERLOAD', desc:'+15% chance to deal 2x damage', apply:p=>p.critChance=Math.min(1,p.critChance+0.15) },
  { key:'ricochet', cat:'offense', name:'RICOCHET ROUNDS', desc:'Shots bounce off walls +1 time', apply:p=>p.ricochet+=1 },
  { key:'lifesteal', cat:'defense', name:'VAMPIRIC ROUNDS', desc:'Heal 5% max integrity per kill', apply:p=>p.lifesteal+=0.05 },
  { key:'regen', cat:'defense', name:'NANOBOT REGEN', desc:'Regenerate 2% max integrity/sec', apply:p=>p.regen+=0.02 },
  { key:'bulletspeed', cat:'offense', name:'OVERDRIVE COILS', desc:'+25% projectile speed', apply:p=>p.bulletSpeedMult*=1.25 },
  { key:'turbodash', cat:'utility', name:'TURBO THRUSTERS', desc:'+25% dash speed, longer dash', apply:p=>{p.dashSpeed*=1.25;p.dashDuration+=40;} },
  { key:'precision', cat:'utility', name:'PRECISION OPTICS', desc:'-50% multishot spread', apply:p=>p.spreadMult*=0.5 },
  { key:'glasscannon', cat:'offense', name:'GLASS CANNON MATRIX', desc:'+75% damage, -20 max integrity', apply:p=>{p.damage*=1.75;p.maxHp=Math.max(20,p.maxHp-20);p.hp=Math.min(p.hp,p.maxHp);} },
  { key:'revive', cat:'defense', name:'EMERGENCY REBOOT', desc:'Revive once at 50% integrity when destroyed', apply:p=>p.hasRevive=true },
  { key:'homing', cat:'offense', name:'TARGETING AI', desc:'Shots steer toward the nearest enemy', apply:p=>p.homingTurn+=2.5/3 },
  { key:'medkit', cat:'defense', name:'REPAIR SURGE', desc:'Restore 50% of missing integrity', apply:p=>p.hp=Math.min(p.maxHp,p.hp+(p.maxHp-p.hp)*0.5) },
];

function offerUpgrades(){
  state.mode = 'upgrade';
  const pool = [...UPGRADE_POOL];
  const picks = [];
  for (let i=0;i<3 && pool.length;i++){
    const idx = Math.floor(Math.random()*pool.length);
    picks.push(pool.splice(idx,1)[0]);
  }
  state.pendingUpgrades = picks;
  renderUpgradeCards(picks);
}

function renderUpgradeCards(picks){
  overlay.innerHTML = `
    <h1 style="font-size:26px;">SECTOR CLEARED</h1>
    <p>Select one upgrade to install.</p>
    <div class="cards">
      ${picks.map((u,i) => `
        <div class="card" data-idx="${i}">
          <div class="cardIcon">${u.icon}</div>
          <h3>${u.name}</h3>
          <p>${u.desc}</p>
          <span class="key">[${i+1}]</span>
        </div>`).join('')}
    </div>
  `;
  overlay.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => pickUpgrade(parseInt(el.dataset.idx,10)));
  });
}

function pickUpgrade(i){
  if (state.mode !== 'upgrade') return;
  const u = state.pendingUpgrades[i];
  if (!u) return;
  Audio8.sfx.upgrade();
  u.apply(player);
  player.upgrades.push(u.name);
  updateUpgradeList();
  overlay.innerHTML = '';
  state.sector += 1;
  enterStory(state.sector);
}

function updateUpgradeList(){
  upgradeListEl.innerHTML = player.upgrades.map(n => '&#9679; ' + n).join('<br>');
}

// ---------- shooting ----------
function tryPlayerShoot(t){
  if (!mouse.down) return;
  if (t - player.lastShot < player.fireCooldown) return;
  player.lastShot = t;
  Audio8.sfx.playerShoot();
  const baseAng = Math.atan2(mouse.y-player.y, mouse.x-player.x);
  const spread = 0.12 * player.spreadMult;
  const n = player.multishot;
  const speed = 620 * player.bulletSpeedMult;
  for (let i=0;i<n;i++){
    const off = (i - (n-1)/2) * spread;
    const ang = baseAng + off;
    const isCrit = Math.random() < player.critChance;
    bullets.push({
      x: player.x + Math.cos(ang)*player.radius,
      y: player.y + Math.sin(ang)*player.radius,
      vx: Math.cos(ang)*speed, vy: Math.sin(ang)*speed,
      radius: 4, damage: isCrit ? player.damage*player.critMult : player.damage,
      pierceLeft: player.pierce, bounces: player.ricochet, crit: isCrit,
    });
  }
}

function enemyShoot(e, t){
  const ang = Math.atan2(player.y-e.y, player.x-e.x);
  const dmgScale = enemyDamageScale(state.sector);
  if (e.type === 'soldier'){
    enemyBullets.push({x:e.x,y:e.y, vx:Math.cos(ang)*300, vy:Math.sin(ang)*300, radius:5, damage:8*dmgScale, homing:false, kind:'soldier'});
    Audio8.sfx.soldierShoot();
  } else if (e.type === 'tank'){
    for (let d=-0.22; d<=0.22; d+=0.22){
      const a = ang+d;
      enemyBullets.push({x:e.x,y:e.y, vx:Math.cos(a)*260, vy:Math.sin(a)*260, radius:6, damage:12*dmgScale, homing:false, kind:'tank'});
    }
    Audio8.sfx.tankShoot();
  } else if (e.type === 'turret'){
    enemyBullets.push({x:e.x,y:e.y, vx:Math.cos(ang)*160, vy:Math.sin(ang)*160, radius:6, damage:16*dmgScale, homing:true, turn:2.4, life:4000, kind:'turret'});
    Audio8.sfx.turretLaunch();
  } else if (e.type === 'boss'){
    for (let d=-0.5; d<=0.5; d+=0.16){
      const a = ang+d;
      enemyBullets.push({x:e.x,y:e.y, vx:Math.cos(a)*230, vy:Math.sin(a)*230, radius:6, damage:14*dmgScale, homing:false, kind:'boss'});
    }
    Audio8.sfx.bossShoot();
  }
}

// ---------- update ----------
function spawnHit(x,y,color){
  for (let i=0;i<6;i++){
    particles.push({x,y, vx:rand(-140,140), vy:rand(-140,140), life:250, maxLife:250, color, r:rand(2,3.5)});
  }
}
function spawnExplosion(x,y,color){
  for (let i=0;i<18;i++){
    const a = rand(0,Math.PI*2);
    const spd = rand(60,280);
    particles.push({
      x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:480, maxLife:480, color: Math.random()<0.4?'#fff':color, r:rand(2,5)
    });
  }
}

function update(dt, t){
  if (state.mode === 'story'){
    state.storyTimer -= dt;
    if (state.storyTimer <= 0) beginSector();
    return;
  }
  if (state.mode !== 'playing') return;

  // player movement
  let mx=0,my=0;
  if (keys['w']||keys['arrowup']) my-=1;
  if (keys['s']||keys['arrowdown']) my+=1;
  if (keys['a']||keys['arrowleft']) mx-=1;
  if (keys['d']||keys['arrowright']) mx+=1;
  const mlen = Math.hypot(mx,my);
  if (mlen>0){ mx/=mlen; my/=mlen; }
  player.moving = mlen > 0;
  if (player.moving) player.animT += dt/1000 * 9;

  if (player.dashTimer > 0){
    player.dashTimer -= dt;
    player.x += mx * (player.dashSpeed) * (dt/1000);
    player.y += my * (player.dashSpeed) * (dt/1000);
  } else {
    player.x += mx * player.speed * (dt/1000);
    player.y += my * player.speed * (dt/1000);
    if (keys[' '] && player.dashCooldownTimer <= 0 && mlen>0){
      player.dashTimer = player.dashDuration;
      player.dashCooldownTimer = player.dashCooldown;
      player.invuln = Math.max(player.invuln, player.dashDuration);
      Audio8.sfx.dash();
    }
  }
  player.dashCooldownTimer = Math.max(0, player.dashCooldownTimer - dt);
  player.invuln = Math.max(0, player.invuln - dt);
  const m = sideMargin();
  player.x = clamp(player.x, m+player.radius, W-m-player.radius);
  player.y = clamp(player.y, player.radius, H-player.radius);

  if (player.regen > 0) player.hp = Math.min(player.maxHp, player.hp + player.regen*player.maxHp*dt/1000);

  tryPlayerShoot(t);

  // bullets
  bullets.forEach(b => {
    if (player.homingTurn > 0 && enemies.length){
      let target = null, bestD = Infinity;
      for (const e of enemies){ const d = dist(b,e); if (d < bestD){ bestD = d; target = e; } }
      if (target){
        const ang = Math.atan2(target.y-b.y, target.x-b.x);
        const curAng = Math.atan2(b.vy,b.vx);
        let diff = ang-curAng;
        while (diff>Math.PI) diff-=Math.PI*2;
        while (diff<-Math.PI) diff+=Math.PI*2;
        const turn = clamp(diff, -player.homingTurn*dt/1000, player.homingTurn*dt/1000);
        const newAng = curAng+turn;
        const spd = Math.hypot(b.vx,b.vy);
        b.vx = Math.cos(newAng)*spd; b.vy = Math.sin(newAng)*spd;
      }
    }
    b.x += b.vx*dt/1000; b.y += b.vy*dt/1000;
    if (b.bounces > 0){
      if (b.x < b.radius || b.x > W-b.radius){ b.vx *= -1; b.x = clamp(b.x, b.radius, W-b.radius); b.bounces--; }
      if (b.y < b.radius || b.y > H-b.radius){ b.vy *= -1; b.y = clamp(b.y, b.radius, H-b.radius); b.bounces--; }
    }
  });
  bullets = bullets.filter(b => b.x>-20 && b.x<W+20 && b.y>-20 && b.y<H+20);

  // enemy bullets
  enemyBullets.forEach(b => {
    if (b.homing){
      const ang = Math.atan2(player.y-b.y, player.x-b.x);
      const curAng = Math.atan2(b.vy,b.vx);
      let diff = ang-curAng;
      while (diff>Math.PI) diff-=Math.PI*2;
      while (diff<-Math.PI) diff+=Math.PI*2;
      const turn = clamp(diff, -b.turn*dt/1000, b.turn*dt/1000);
      const newAng = curAng+turn;
      const spd = Math.hypot(b.vx,b.vy);
      b.vx = Math.cos(newAng)*spd; b.vy = Math.sin(newAng)*spd;
      b.life -= dt;
    }
    b.x += b.vx*dt/1000; b.y += b.vy*dt/1000;
  });
  enemyBullets = enemyBullets.filter(b => b.x>-20 && b.x<W+20 && b.y>-20 && b.y<H+20 && (b.life===undefined || b.life>0));

  // particles
  particles.forEach(p => { p.x+=p.vx*dt/1000; p.y+=p.vy*dt/1000; p.life-=dt; });
  particles = particles.filter(p => p.life>0);

  // enemies AI
  enemies.forEach(e => {
    if (e.type === 'soldier'){
      const d = dist(e,player);
      const ang = Math.atan2(player.y-e.y, player.x-e.x);
      if (d > 260) { e.x += Math.cos(ang)*e.speed*dt/1000; e.y += Math.sin(ang)*e.speed*dt/1000; }
      else if (d < 180) { e.x -= Math.cos(ang)*e.speed*dt/1000; e.y -= Math.sin(ang)*e.speed*dt/1000; }
      if (t - e.lastShot > e.shootCooldown){ e.lastShot = t; enemyShoot(e,t); }
    } else if (e.type === 'tank'){
      const d = dist(e,player);
      const ang = Math.atan2(player.y-e.y, player.x-e.x);
      if (d > 140){ e.x += Math.cos(ang)*e.speed*dt/1000; e.y += Math.sin(ang)*e.speed*dt/1000; }
      if (t - e.lastShot > e.shootCooldown){ e.lastShot = t; enemyShoot(e,t); }
    } else if (e.type === 'turret'){
      if (t - e.lastShot > e.shootCooldown){ e.lastShot = t; enemyShoot(e,t); }
    } else if (e.type === 'boss'){
      const ang = Math.atan2(player.y-e.y, player.x-e.x);
      e.x += Math.cos(ang)*e.speed*dt/1000*Math.sin(t/900);
      e.x = clamp(e.x, m+80, W-m-80);
      if (t - e.lastShot > e.shootCooldown){ e.lastShot = t; enemyShoot(e,t); }
      if (t - e.lastSpawn > e.spawnCooldown){
        e.lastSpawn = t;
        enemies.push(makeEnemy('soldier', state.sector));
      }
    }
    e.x = clamp(e.x, m+e.radius, W-m-e.radius);
    e.y = clamp(e.y, e.radius, H-e.radius);
  });

  // collisions: player bullets vs enemies
  for (const b of bullets){
    for (const e of enemies){
      if (b._dead) continue;
      if (dist(b,e) < b.radius+e.radius){
        e.hp -= b.damage;
        spawnHit(b.x,b.y,e.color||'#fff');
        Audio8.sfx.hit();
        if (b.pierceLeft > 0) b.pierceLeft--; else b._dead = true;
        break;
      }
    }
  }
  bullets = bullets.filter(b => !b._dead);
  enemies.forEach(e => {
    if (e.hp<=0){
      spawnExplosion(e.x,e.y,e.color||'#fff');
      Audio8.sfx.explosion();
      if (e.type === 'boss') state.bossesDefeated++;
      if (player.lifesteal > 0) player.hp = Math.min(player.maxHp, player.hp + player.lifesteal*player.maxHp);
    }
  });
  enemies = enemies.filter(e => e.hp > 0);

  // collisions: enemy bullets / contact vs player
  if (player.invuln <= 0){
    for (const b of enemyBullets){
      if (dist(b,player) < b.radius+player.radius){
        applyDamage(b.damage);
        b._dead = true;
        break;
      }
    }
    for (const e of enemies){
      if (dist(e,player) < e.radius+player.radius+4){
        const contactBase = e.type==='tank'?18:(e.type==='boss'?26:10);
        applyDamage(contactBase * enemyDamageScale(state.sector));
        break;
      }
    }
  }
  enemyBullets = enemyBullets.filter(b => !b._dead);

  if (player.hp <= 0){
    if (player.hasRevive){
      player.hasRevive = false;
      player.hp = player.maxHp * 0.5;
      player.invuln = 1500;
      spawnExplosion(player.x, player.y, '#5dffb0');
      Audio8.sfx.upgrade();
    } else {
      triggerGameOver();
      return;
    }
  }

  if (enemies.length === 0 && !roomCleared){
    roomCleared = true;
    setTimeout(offerUpgrades, 250);
  }
}

function applyDamage(dmg){
  const reduced = dmg * (1-(player.armor||0));
  player.hp -= reduced;
  player.invuln = 420;
  Audio8.sfx.playerHurt();
}

function triggerGameOver(){
  state.mode = 'gameover';
  const bossLine = state.bossesDefeated > 0
    ? `<p>Wardens defeated: ${state.bossesDefeated}</p>`
    : '';
  overlay.innerHTML = `
    <h1 style="color:#ff3050;">SYSTEM TERMINATED</h1>
    <h2 style="font-size:16px; color:#ff9d5d;">Reached Sector ${state.sector}</h2>
    ${bossLine}
    <p class="hint">Press R or click to reboot</p>
  `;
  overlay.style.pointerEvents = 'auto';
  overlay.onclick = () => { overlay.onclick=null; overlay.style.pointerEvents='none'; startRun(); };
}

// ---------- draw ----------
function drawGrid(t){
  // depth-shaded floor base (darker toward the far/top wall, lighter near the viewer)
  const floor = ctx.createLinearGradient(0,0,0,H);
  floor.addColorStop(0, '#050810');
  floor.addColorStop(0.2, '#0a121b');
  floor.addColorStop(1, '#101c28');
  ctx.fillStyle = floor;
  ctx.fillRect(0,0,W,H);

  // converging verticals toward a vanishing point above the screen (perspective floor)
  ctx.strokeStyle = 'rgba(35,90,120,0.4)';
  ctx.lineWidth = 1;
  for (let i=-8;i<=8;i++){
    const xBottom = W/2 + i*70;
    const xTop = W/2 + i*70*0.1;
    ctx.beginPath(); ctx.moveTo(xBottom, H); ctx.lineTo(xTop, 0); ctx.stroke();
  }

  // horizontals with perspective spacing: dense & dim far away, sparse & bright close up
  const rows = 16;
  for (let j=1;j<=rows;j++){
    const k = j/rows;
    const y = H - H*Math.pow(k,1.8);
    ctx.globalAlpha = 0.12 + k*0.4;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // ceiling light pools
  for (const lx of [W*0.22, W*0.5, W*0.78]){
    const glow = ctx.createRadialGradient(lx, -20, 10, lx, -20, 200);
    glow.addColorStop(0,'rgba(90,220,255,0.14)');
    glow.addColorStop(1,'rgba(90,220,255,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(lx-200, -20, 400, 240);
  }

  // faint animated scanline sweep
  if (t !== undefined){
    const sweepY = (t/14) % (H+120) - 60;
    const sweep = ctx.createLinearGradient(0, sweepY-40, 0, sweepY+40);
    sweep.addColorStop(0, 'rgba(80,220,255,0)');
    sweep.addColorStop(0.5, 'rgba(80,220,255,0.05)');
    sweep.addColorStop(1, 'rgba(80,220,255,0)');
    ctx.fillStyle = sweep;
    ctx.fillRect(0, sweepY-40, W, 80);
  }
}

function isOutdoor(sector){ return sector > BOSS_INTERVAL; }

function drawOutdoorBackground(t){
  const horizon = H*0.52;

  const sky = ctx.createLinearGradient(0,0,0,horizon);
  sky.addColorStop(0, '#16293f');
  sky.addColorStop(1, '#3c6b6a');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,horizon);

  const gx = W*0.8, gy = H*0.14;
  const glow = ctx.createRadialGradient(gx,gy,4, gx,gy,100);
  glow.addColorStop(0,'rgba(255,232,190,0.85)');
  glow.addColorStop(1,'rgba(255,232,190,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(gx,gy,100,0,Math.PI*2); ctx.fill();

  // drifting parallax clouds
  if (t !== undefined){
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    for (let i=0;i<5;i++){
      const cx = ((i*220 + t*0.012) % (W+220)) - 110;
      const cy = 36 + (i%3)*26;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 42,15,0,0,Math.PI*2);
      ctx.ellipse(cx+26, cy+3, 28,11,0,0,Math.PI*2);
      ctx.ellipse(cx-24, cy+4, 24,10,0,0,Math.PI*2);
      ctx.fill();
    }
  }

  // far hill layer: muted, subtler bumps, sits behind
  ctx.fillStyle = '#233f4f';
  ctx.beginPath();
  ctx.moveTo(0,horizon);
  for (let x=0;x<=W;x+=70){ ctx.lineTo(x, horizon - 30 - Math.sin(x*0.007+2)*10); }
  ctx.lineTo(W,horizon); ctx.closePath(); ctx.fill();

  // near hill layer: darker, bigger bumps, closer
  ctx.fillStyle = '#16283a';
  ctx.beginPath();
  ctx.moveTo(0,horizon);
  for (let x=0;x<=W;x+=60){ ctx.lineTo(x, horizon - 16 - Math.sin(x*0.011+7)*14); }
  ctx.lineTo(W,horizon); ctx.closePath(); ctx.fill();

  // horizon haze for atmospheric depth
  const haze = ctx.createLinearGradient(0,horizon-36,0,horizon+6);
  haze.addColorStop(0,'rgba(150,180,170,0)');
  haze.addColorStop(1,'rgba(150,180,170,0.22)');
  ctx.fillStyle = haze;
  ctx.fillRect(0,horizon-36,W,42);

  const ground = ctx.createLinearGradient(0,horizon,0,H);
  ground.addColorStop(0,'#2c4a2e');
  ground.addColorStop(1,'#182a1a');
  ctx.fillStyle = ground;
  ctx.fillRect(0,horizon,W,H-horizon);

  // perspective-scaled grass: small & sparse near the horizon, big & dense near the viewer
  ctx.strokeStyle = 'rgba(110,160,110,0.4)';
  let gy2 = horizon+6;
  while (gy2 < H){
    const depth = (gy2-horizon)/(H-horizon);
    const spacingX = 14 + depth*26;
    const tuftH = 5 + depth*13;
    ctx.lineWidth = 1 + depth*1.5;
    for (let gx2 = (depth*37)%spacingX; gx2<W; gx2+=spacingX){
      const jitter = ((gx2*13 + gy2*7) % 11) - 5;
      ctx.beginPath();
      ctx.moveTo(gx2+jitter, gy2);
      ctx.lineTo(gx2+jitter-2, gy2-tuftH);
      ctx.stroke();
    }
    gy2 += 10 + depth*22;
  }
}

function drawPlayer(t){
  const ang = Math.atan2(mouse.y-player.y, mouse.x-player.x);
  const r = player.radius;
  const flashing = player.invuln > 0 && Math.floor(player.invuln/80)%2===0;
  const OUTLINE = '#0a0a14';
  ctx.save();
  ctx.translate(player.x, player.y);

  // soft ground shadow
  const shGrad = ctx.createRadialGradient(r*0.12, r*0.82, r*0.05, r*0.12, r*0.82, r*1.1);
  shGrad.addColorStop(0,'rgba(0,0,0,0.42)');
  shGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = shGrad;
  ctx.beginPath(); ctx.ellipse(r*0.12, r*0.82, r*1.1, r*0.42, 0, 0, Math.PI*2); ctx.fill();

  // dash streaks
  if (player.dashTimer > 0){
    ctx.strokeStyle = 'rgba(44,232,255,0.55)';
    ctx.lineWidth = 3;
    for (let i=1;i<=3;i++){
      const bx = -Math.cos(ang)*r*i*1.2, by = -Math.sin(ang)*r*i*1.2;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx-Math.cos(ang)*10, by-Math.sin(ang)*10); ctx.stroke();
    }
  }

  // articulated foot pods with hip struts
  const walk = Math.sin(player.animT) * (player.moving ? 4 : 0);
  [[-1, walk],[1, -walk]].forEach(([sx, wy])=>{
    ctx.strokeStyle = '#1d2b1a'; ctx.lineWidth = r*0.13;
    ctx.beginPath(); ctx.moveTo(sx*r*0.38, r*0.12); ctx.lineTo(sx*r*0.5, r*0.48+wy); ctx.stroke();
    const fg = ctx.createRadialGradient(sx*r*0.42, r*0.46+wy, r*0.03, sx*r*0.5, r*0.55+wy, r*0.34);
    fg.addColorStop(0,'#66795a');
    fg.addColorStop(0.55,'#3c4d3b');
    fg.addColorStop(1,'#172015');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.ellipse(sx*r*0.5, r*0.55+wy, r*0.3, r*0.17, 0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(8,12,8,0.65)'; ctx.lineWidth = 1.1; ctx.stroke();
  });

  // shoulder armor pods (track aim), shaded from the upper-left
  ctx.save();
  ctx.rotate(ang);
  [-1,1].forEach(side=>{
    const sg = ctx.createRadialGradient(-r*0.16, side*r*0.76, r*0.04, -r*0.05, side*r*0.82, r*0.42);
    sg.addColorStop(0, flashing ? '#ffffff' : '#7da26b');
    sg.addColorStop(0.55, flashing ? '#ffffff' : '#41693f');
    sg.addColorStop(1, flashing ? '#ffffff' : '#1c2f1a');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.ellipse(-r*0.05, side*r*0.82, r*0.34, r*0.2, 0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(8,12,8,0.6)'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.strokeStyle = 'rgba(10,16,10,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(-r*0.05, side*r*0.82, r*0.21, r*0.11, 0,0,Math.PI*2); ctx.stroke();
  });
  ctx.restore();

  // hull: weathered green alloy dome lit from the upper-left
  const hull = ctx.createRadialGradient(-r*0.38,-r*0.42, r*0.08, r*0.05, r*0.08, r*1.18);
  hull.addColorStop(0, flashing ? '#ffffff' : '#c9edb4');
  hull.addColorStop(0.3, flashing ? '#ffffff' : '#7cc26a');
  hull.addColorStop(0.65, flashing ? '#ffffff' : '#3f8a44');
  hull.addColorStop(1, flashing ? '#ffffff' : '#15311c');
  ctx.fillStyle = hull;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();

  // occlusion rim + lit edge
  ctx.strokeStyle = 'rgba(6,12,8,0.75)'; ctx.lineWidth = r*0.06;
  ctx.beginPath(); ctx.arc(0,0,r*0.98,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(225,255,215,0.3)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0,0,r*0.92, Math.PI*1.05, Math.PI*1.75); ctx.stroke();

  // panel seams and weathering scratches
  ctx.strokeStyle = 'rgba(10,20,12,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0,0,r*0.66,-2.7,-0.9); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,r*0.66, 0.5, 2.2); ctx.stroke();
  ctx.strokeStyle = 'rgba(10,20,12,0.25)';
  ctx.beginPath(); ctx.moveTo(-r*0.55, r*0.18); ctx.lineTo(r*0.1, r*0.62); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.3,-r*0.72); ctx.lineTo(r*0.62,-r*0.5); ctx.stroke();

  // soft layered specular
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.ellipse(-r*0.34,-r*0.4, r*0.34, r*0.2, -0.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.ellipse(-r*0.38,-r*0.44, r*0.18, r*0.1, -0.6, 0, Math.PI*2); ctx.fill();

  // hull bolts with lit crescents
  [[-r*0.62,-r*0.68],[r*0.68,-r*0.6],[-r*0.72,r*0.4],[r*0.55,r*0.62]].forEach(([bx,by])=>{
    ctx.fillStyle = '#12301c';
    ctx.beginPath(); ctx.arc(bx,by,r*0.06,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(220,255,220,0.4)'; ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.arc(bx,by,r*0.05, Math.PI*0.9, Math.PI*1.7); ctx.stroke();
  });

  // porthole hatch: glass under a metal ring, tints red as integrity drops
  const hpFrac = player.hp / player.maxHp;
  const glass = ctx.createRadialGradient(-r*0.25, r*0.27, r*0.02, -r*0.2, r*0.32, r*0.2);
  if (hpFrac < 0.3){
    glass.addColorStop(0,'#ffd9d9'); glass.addColorStop(0.6,'#ff6a6a'); glass.addColorStop(1,'#7a1a1a');
  } else {
    glass.addColorStop(0,'#f4fff4'); glass.addColorStop(0.6,'#b9dcc0'); glass.addColorStop(1,'#4a6e54');
  }
  ctx.fillStyle = glass;
  ctx.beginPath(); ctx.arc(-r*0.2, r*0.32, r*0.18,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#1a2e1c'; ctx.lineWidth = r*0.055;
  ctx.beginPath(); ctx.arc(-r*0.2, r*0.32, r*0.19,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(230,255,235,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(-r*0.2, r*0.32, r*0.13, -2.6, -1.2); ctx.stroke();

  // weapon arm
  ctx.save();
  ctx.rotate(ang);

  // shoulder mount
  ctx.fillStyle = '#1a231d';
  roundRect(ctx, -r*0.02, -r*0.2, r*0.22, r*0.4, r*0.06); ctx.fill();

  // main barrel housing — cylindrical gunmetal shading
  const barrelGrad = ctx.createLinearGradient(0,-r*0.14,0,r*0.14);
  barrelGrad.addColorStop(0,'#6a746c');
  barrelGrad.addColorStop(0.35,'#39423a');
  barrelGrad.addColorStop(1,'#101511');
  ctx.fillStyle = barrelGrad;
  ctx.fillRect(r*0.1, -r*0.14, r*1.0, r*0.28);
  ctx.strokeStyle = 'rgba(8,12,9,0.8)'; ctx.lineWidth = 1.2;
  ctx.strokeRect(r*0.1, -r*0.14, r*1.0, r*0.28);

  // cooling fins
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
  for (let fx = r*0.28; fx < r*0.95; fx += r*0.13){
    ctx.beginPath(); ctx.moveTo(fx,-r*0.14); ctx.lineTo(fx,r*0.14); ctx.stroke();
  }

  // energy conduit that brightens as the weapon nears ready-to-fire
  const readiness = clamp((t - player.lastShot) / player.fireCooldown, 0, 1);
  ctx.strokeStyle = `rgba(93,255,224,${0.25+readiness*0.6})`;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(r*0.15,0); ctx.lineTo(r*1.02,0); ctx.stroke();

  // slung ammo cell — olive metal
  const cellGrad = ctx.createLinearGradient(0, r*0.1, 0, r*0.32);
  cellGrad.addColorStop(0,'#4c5a3e'); cellGrad.addColorStop(1,'#232c1c');
  ctx.fillStyle = cellGrad;
  roundRect(ctx, r*0.32, r*0.1, r*0.28, r*0.22, r*0.04); ctx.fill();
  ctx.strokeStyle = 'rgba(8,12,8,0.7)'; ctx.lineWidth = 1;
  roundRect(ctx, r*0.32, r*0.1, r*0.28, r*0.22, r*0.04); ctx.stroke();
  ctx.fillStyle = Math.sin(t/180) > 0 ? '#5dffe0' : '#175c52';
  ctx.beginPath(); ctx.arc(r*0.46, r*0.21, r*0.06, 0, Math.PI*2); ctx.fill();

  // front sight rail
  ctx.fillStyle = '#20281f';
  ctx.fillRect(r*0.55, -r*0.26, r*0.08, r*0.12);

  // muzzle brake — steel with bore rings
  const mzGrad = ctx.createLinearGradient(0,-r*0.18,0,r*0.18);
  mzGrad.addColorStop(0,'#7c857d'); mzGrad.addColorStop(0.4,'#454d45'); mzGrad.addColorStop(1,'#141814');
  ctx.fillStyle = mzGrad;
  ctx.fillRect(r*1.0, -r*0.18, r*0.25, r*0.36);
  ctx.strokeStyle = 'rgba(10,12,10,0.8)'; ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.arc(r*1.12,0,r*0.14,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(r*1.12,0,r*0.07,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#060806';
  ctx.beginPath(); ctx.arc(r*1.2,0,r*0.05,0,Math.PI*2); ctx.fill();

  if (t - player.lastShot < 60){
    ctx.fillStyle = 'rgba(160,255,240,0.5)';
    ctx.beginPath(); ctx.arc(r*1.3, 0, r*0.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(r*1.3, 0, r*0.3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // big cute cartoon eyes, tracking aim precisely like a face
  ctx.save();
  ctx.rotate(ang);
  [-1,1].forEach(side=>{
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(r*0.32, side*r*0.24, r*0.2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = OUTLINE; ctx.lineWidth = r*0.045;
    ctx.beginPath(); ctx.arc(r*0.32, side*r*0.24, r*0.2, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#0a0a14';
    ctx.beginPath(); ctx.arc(r*0.4, side*r*0.24, r*0.1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(r*0.43, side*r*0.24-r*0.03, r*0.035, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();

  // periscope mast with glass lens knob (fixed, doesn't track aim)
  ctx.strokeStyle = '#0e1810'; ctx.lineWidth = 3.6;
  ctx.beginPath(); ctx.moveTo(-r*0.1,-r*0.55); ctx.lineTo(-r*0.2, -r*0.92); ctx.stroke();
  ctx.strokeStyle = '#4e6a4a'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(-r*0.11,-r*0.56); ctx.lineTo(-r*0.2, -r*0.9); ctx.stroke();
  const knob = ctx.createRadialGradient(-r*0.24,-r*0.96, r*0.01, -r*0.2,-r*0.92, r*0.14);
  const knobLit = Math.sin(t/250) > 0;
  knob.addColorStop(0, knobLit ? '#c9ffe2' : '#68806b');
  knob.addColorStop(0.6, knobLit ? '#5dffb0' : '#2c4a34');
  knob.addColorStop(1, '#122417');
  ctx.fillStyle = knob;
  ctx.beginPath(); ctx.arc(-r*0.2, -r*0.92, r*0.13, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(8,14,9,0.8)'; ctx.lineWidth = 1.1;
  ctx.beginPath(); ctx.arc(-r*0.2, -r*0.92, r*0.13, 0, Math.PI*2); ctx.stroke();

  ctx.restore();
}

function drawSoldier(e, ang, t){
  const r = e.radius;
  ctx.save();
  ctx.rotate(ang);
  const walk = Math.sin(t/120 + e.x*0.05) * r*0.15;

  // camo trousers + boots
  [[-r*0.24, walk],[r*0.21, -walk]].forEach(([off, wy])=>{
    const lg = ctx.createLinearGradient(off-r*0.16, 0, off+r*0.16, 0);
    lg.addColorStop(0,'#6b5136'); lg.addColorStop(0.45,'#4a3a26'); lg.addColorStop(1,'#2b2013');
    ctx.fillStyle = lg;
    roundRect(ctx, off-r*0.16, r*0.05+wy, r*0.32, r*0.85, 3); ctx.fill();
    ctx.fillStyle = '#15100a';
    roundRect(ctx, off-r*0.18, r*0.72+wy, r*0.36, r*0.18, 3); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(off-r*0.16, r*0.4+wy); ctx.lineTo(off+r*0.16, r*0.4+wy); ctx.stroke();
  });

  // torso: plate carrier over fatigues, lit from the upper-left
  const vest = ctx.createLinearGradient(-r*0.55,-r*0.6, r*0.5, r*0.45);
  vest.addColorStop(0,'#7a6a4a');
  vest.addColorStop(0.5,'#57492f');
  vest.addColorStop(1,'#2e2617');
  ctx.fillStyle = vest;
  roundRect(ctx, -r*0.55, -r*0.6, r*1.1, r*1.05, 4); ctx.fill();
  ctx.strokeStyle = 'rgba(10,8,4,0.7)'; ctx.lineWidth = 1.3;
  roundRect(ctx, -r*0.55, -r*0.6, r*1.1, r*1.05, 4); ctx.stroke();

  // chest plate recess + webbing straps
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  roundRect(ctx, -r*0.34, -r*0.34, r*0.68, r*0.6, 3); ctx.fill();
  ctx.strokeStyle = 'rgba(20,14,8,0.8)'; ctx.lineWidth = r*0.07;
  ctx.beginPath(); ctx.moveTo(-r*0.5,-r*0.55); ctx.lineTo(-r*0.2, r*0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.42,-r*0.55); ctx.lineTo(r*0.12, r*0.4); ctx.stroke();

  // faction pauldron in unit colors
  const pd = ctx.createRadialGradient(-r*0.42,-r*0.56, r*0.02, -r*0.35,-r*0.5, r*0.24);
  pd.addColorStop(0,'#ffd9b0'); pd.addColorStop(0.5, e.color); pd.addColorStop(1,'#5a2c10');
  ctx.fillStyle = pd;
  ctx.beginPath(); ctx.ellipse(-r*0.35,-r*0.5, r*0.2, r*0.16, 0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(20,10,4,0.7)'; ctx.lineWidth = 1.1; ctx.stroke();

  // radio pack with whip antenna
  ctx.fillStyle = '#241a10';
  ctx.fillRect(-r*0.75, -r*0.3, r*0.22, r*0.5);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1;
  ctx.strokeRect(-r*0.75, -r*0.3, r*0.22, r*0.5);
  ctx.strokeStyle = '#3a2c1a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-r*0.64,-r*0.3); ctx.lineTo(-r*0.58,-r*0.62); ctx.stroke();

  // helmet: matte steel with amber visor
  const helm = ctx.createRadialGradient(r*0.05,-r*0.12, r*0.03, r*0.15, 0, r*0.46);
  helm.addColorStop(0,'#555c57'); helm.addColorStop(0.55,'#31363a'); helm.addColorStop(1,'#101216');
  ctx.fillStyle = helm;
  ctx.beginPath(); ctx.arc(r*0.15, 0, r*0.42, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(6,8,8,0.8)'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(r*0.15, 0, r*0.42, 0, Math.PI*2); ctx.stroke();
  const visor = ctx.createLinearGradient(r*0.05,-r*0.12, r*0.45, r*0.04);
  visor.addColorStop(0,'#ffe9a3'); visor.addColorStop(0.5,'#e8a93d'); visor.addColorStop(1,'#7a4d12');
  ctx.fillStyle = visor;
  roundRect(ctx, r*0.05, -r*0.12, r*0.4, r*0.16, r*0.05); ctx.fill();
  ctx.strokeStyle = 'rgba(10,8,4,0.7)'; ctx.lineWidth = 1;
  roundRect(ctx, r*0.05, -r*0.12, r*0.4, r*0.16, r*0.05); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.ellipse(r*0.14,-r*0.07, r*0.07, r*0.02, -0.2, 0, Math.PI*2); ctx.fill();

  // rifle: receiver, sight, foregrip, muzzle
  const gun = ctx.createLinearGradient(0,-r*0.08,0,r*0.08);
  gun.addColorStop(0,'#4a4f4a'); gun.addColorStop(0.5,'#232623'); gun.addColorStop(1,'#0c0e0c');
  ctx.fillStyle = gun;
  ctx.fillRect(r*0.35, -r*0.08, r*0.95, r*0.16);
  ctx.fillStyle = '#31352f';
  ctx.fillRect(r*0.55, -r*0.18, r*0.1, r*0.1);
  ctx.fillRect(r*0.72, r*0.06, r*0.09, r*0.14);
  ctx.fillStyle = '#171916';
  ctx.fillRect(r*1.2, -r*0.1, r*0.14, r*0.2);
  ctx.fillStyle = '#060706';
  ctx.beginPath(); ctx.arc(r*1.34, 0, r*0.035, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawTank(e, ang, t){
  const r = e.radius;
  ctx.save();
  ctx.rotate(ang);

  // treads: shaded rubber with moving links and road wheels
  const offset = (t/200) % (r*0.44);
  [-r*0.95, r*0.45].forEach(ty=>{
    const tg = ctx.createLinearGradient(0, ty, 0, ty+r*0.5);
    tg.addColorStop(0,'#2c332c'); tg.addColorStop(0.5,'#171c17'); tg.addColorStop(1,'#0a0d0a');
    ctx.fillStyle = tg;
    roundRect(ctx, -r*1.05, ty, r*2.1, r*0.5, 4); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.2;
    roundRect(ctx, -r*1.05, ty, r*2.1, r*0.5, 4); ctx.stroke();
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    for (let i=-5;i<=5;i++){
      const tx = i*r*0.22 - offset;
      ctx.fillRect(tx, ty+r*0.04, r*0.06, r*0.42);
    }
    for (const wx of [-r*0.7, -r*0.23, r*0.23, r*0.7]){
      const wg = ctx.createRadialGradient(wx-r*0.03, ty+r*0.22, r*0.01, wx, ty+r*0.25, r*0.14);
      wg.addColorStop(0,'#5a615a'); wg.addColorStop(0.7,'#2a2f2a'); wg.addColorStop(1,'#101310');
      ctx.fillStyle = wg;
      ctx.beginPath(); ctx.arc(wx, ty+r*0.25, r*0.13, 0, Math.PI*2); ctx.fill();
    }
  });

  // hull: armored plate with directional shading and panel seams
  ctx.save();
  roundRect(ctx, -r*0.85, -r*0.55, r*1.7, r*1.1, 5); ctx.clip();
  ctx.fillStyle = e.color;
  ctx.fillRect(-r*0.85,-r*0.55,r*1.7,r*1.1);
  const hullShade = ctx.createLinearGradient(-r*0.85,-r*0.55, r*0.85, r*0.55);
  hullShade.addColorStop(0,'rgba(255,255,255,0.3)');
  hullShade.addColorStop(0.45,'rgba(0,0,0,0)');
  hullShade.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle = hullShade;
  ctx.fillRect(-r*0.85,-r*0.55,r*1.7,r*1.1);
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-r*0.3,-r*0.55); ctx.lineTo(-r*0.3,r*0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.45,-r*0.55); ctx.lineTo(r*0.45,r*0.55); ctx.stroke();
  ctx.restore();
  ctx.strokeStyle = 'rgba(8,14,9,0.8)'; ctx.lineWidth = 1.6;
  roundRect(ctx, -r*0.85, -r*0.55, r*1.7, r*1.1, 5); ctx.stroke();

  // hull rivets with lit crescents
  for (const hx of [-r*0.6,-r*0.2,r*0.2,r*0.6]){
    for (const hy of [-r*0.42, r*0.42]){
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath(); ctx.arc(hx,hy,r*0.05,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(hx,hy,r*0.04, Math.PI*0.9, Math.PI*1.7); ctx.stroke();
    }
  }

  // headlights: glass lenses
  [-r*0.35, r*0.35].forEach(hy=>{
    const on = Math.sin(t/300)>0;
    const hl = ctx.createRadialGradient(r*0.76, hy-r*0.02, r*0.01, r*0.78, hy, r*0.09);
    hl.addColorStop(0, on ? '#fffdf0' : '#d8cfa0');
    hl.addColorStop(0.6, on ? '#f0e3a8' : '#8a8055');
    hl.addColorStop(1,'#3a3520');
    ctx.fillStyle = hl;
    ctx.beginPath(); ctx.arc(r*0.78, hy, r*0.08,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 0.9; ctx.stroke();
  });

  // exhaust with soot stain
  ctx.fillStyle = '#131713';
  ctx.fillRect(-r*1.0,-r*0.1,r*0.14,r*0.2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(-r*1.05, 0, r*0.1, r*0.14, 0, 0, Math.PI*2); ctx.fill();

  // turret: domed with radial shading and race ring
  const tur = ctx.createRadialGradient(-r*0.16,-r*0.18, r*0.04, 0, 0, r*0.6);
  tur.addColorStop(0,'#7ab98a');
  tur.addColorStop(0.5,'#3f7a4e');
  tur.addColorStop(1,'#12291a');
  ctx.fillStyle = tur;
  ctx.beginPath(); ctx.arc(0,0,r*0.55,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(6,12,8,0.8)'; ctx.lineWidth = 1.4; ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0,0,r*0.38,0,Math.PI*2); ctx.stroke();

  // cannon: cylindrical shading + muzzle collar
  const gun = ctx.createLinearGradient(0,-r*0.12,0,r*0.12);
  gun.addColorStop(0,'#59645b'); gun.addColorStop(0.45,'#2b332c'); gun.addColorStop(1,'#0e120e');
  ctx.fillStyle = gun;
  ctx.fillRect(r*0.2, -r*0.12, r*1.15, r*0.24);
  ctx.fillStyle = '#39423a';
  ctx.fillRect(r*1.18, -r*0.15, r*0.17, r*0.3);
  ctx.fillStyle = '#050705';
  ctx.beginPath(); ctx.ellipse(r*1.35, 0, r*0.035, r*0.1, 0, 0, Math.PI*2); ctx.fill();

  // commander hatch
  const hat = ctx.createRadialGradient(-r*0.05,-r*0.05, r*0.01, 0,0, r*0.16);
  hat.addColorStop(0,'#4e8a5c'); hat.addColorStop(1,'#0e2114');
  ctx.fillStyle = hat;
  ctx.beginPath(); ctx.arc(0,0,r*0.14,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 0.9; ctx.stroke();
  ctx.restore();
}

function drawTurretEnemy(e, ang, t){
  const r = e.radius;
  ctx.save();
  // hex base with machined-metal shading
  ctx.beginPath();
  for (let i=0;i<6;i++){
    const a = i*Math.PI/3;
    const px = Math.cos(a)*r, py = Math.sin(a)*r;
    if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
  const base = ctx.createRadialGradient(-r*0.35,-r*0.4, r*0.05, 0, 0, r*1.05);
  base.addColorStop(0,'#5b4a68');
  base.addColorStop(0.55,'#332243');
  base.addColorStop(1,'#120a1a');
  ctx.fillStyle = base;
  ctx.fill();
  ctx.strokeStyle = 'rgba(8,5,12,0.85)'; ctx.lineWidth = r*0.07; ctx.stroke();

  // worn hazard striping
  ctx.save();
  ctx.clip();
  ctx.strokeStyle = 'rgba(255,196,40,0.16)';
  ctx.lineWidth = r*0.16;
  for (let i=-6;i<=6;i++){
    ctx.beginPath();
    ctx.moveTo(-r+i*(r*0.3), r);
    ctx.lineTo(-r+i*(r*0.3)+r, -r);
    ctx.stroke();
  }
  ctx.restore();

  // corner bolts with lit crescents
  for (let i=0;i<6;i++){
    const a = i*Math.PI/3;
    const bx = Math.cos(a)*r*0.85, by = Math.sin(a)*r*0.85;
    ctx.fillStyle = '#0e0714';
    ctx.beginPath(); ctx.arc(bx,by,r*0.08,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(220,200,255,0.3)'; ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.arc(bx,by,r*0.065, Math.PI*0.9, Math.PI*1.7); ctx.stroke();
  }

  // pivot ring
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0,0,r*0.34,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  // launcher arm + radar dish tracking the player
  ctx.save();
  ctx.rotate(ang);
  const arm = ctx.createLinearGradient(0,-r*0.1,0,r*0.1);
  arm.addColorStop(0,'#4a3f56'); arm.addColorStop(1,'#171020');
  ctx.fillStyle = arm;
  ctx.fillRect(-r*0.08, -r*0.1, r*0.6, r*0.2);
  const dish = ctx.createRadialGradient(r*0.47,-r*0.1, r*0.02, r*0.55, 0, r*0.42);
  dish.addColorStop(0,'#d9c2ec');
  dish.addColorStop(0.45, e.color);
  dish.addColorStop(1,'#2a1338');
  ctx.fillStyle = dish;
  ctx.beginPath(); ctx.arc(r*0.55,0,r*0.4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(10,6,16,0.8)'; ctx.lineWidth = 1.3; ctx.stroke();
  ctx.strokeStyle = 'rgba(20,8,30,0.45)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(r*0.55,0,r*0.27,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(r*0.55,0,r*0.15,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.ellipse(r*0.45,-r*0.14,r*0.09,r*0.05,-0.4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // status beacons with soft glow
  const beaconOn = Math.sin(t/220) > 0;
  ctx.shadowColor = '#ff5050'; ctx.shadowBlur = beaconOn ? 7 : 0;
  ctx.fillStyle = beaconOn ? '#ff5050' : '#4a1616';
  ctx.beginPath(); ctx.arc(0,-r*0.15,r*0.1,0,Math.PI*2); ctx.fill();
  ctx.shadowColor = '#ffe15d'; ctx.shadowBlur = beaconOn ? 0 : 6;
  ctx.fillStyle = beaconOn ? '#4a3d14' : '#ffe15d';
  ctx.beginPath(); ctx.arc(0,r*0.18,r*0.075,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBoss(e, ang, t){
  const r = e.radius;
  // rotating outer track with lit inner edge
  ctx.save();
  ctx.rotate(t/2000);
  ctx.strokeStyle = 'rgba(90,15,34,0.8)';
  ctx.lineWidth = 6;
  ctx.setLineDash([14,10]);
  ctx.beginPath(); ctx.arc(0,0,r*1.15,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,120,150,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0,0,r*1.13,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // rotating blades with beveled lit edges
  ctx.save();
  ctx.rotate(-t/1500);
  for (let i=0;i<8;i++){
    ctx.save();
    ctx.rotate(i*Math.PI/4);
    ctx.fillStyle = '#4a0c1d';
    ctx.beginPath();
    ctx.moveTo(r*0.95,0);
    ctx.lineTo(r*1.3, -r*0.08);
    ctx.lineTo(r*1.3, r*0.08);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(255,110,140,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(r*0.97,-r*0.01); ctx.lineTo(r*1.28,-r*0.07); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();

  // armored core: dark crimson steel lit from the upper-left
  const core = ctx.createRadialGradient(-r*0.35,-r*0.4, r*0.06, r*0.05, r*0.05, r*1.15);
  core.addColorStop(0,'#b23a52');
  core.addColorStop(0.4,'#7a1830');
  core.addColorStop(0.75,'#40091a');
  core.addColorStop(1,'#1c030c');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(10,2,6,0.85)'; ctx.lineWidth = r*0.05;
  ctx.beginPath(); ctx.arc(0,0,r*0.985,0,Math.PI*2); ctx.stroke();

  // plate seam + slowly rotating rivet ring
  ctx.strokeStyle = 'rgba(20,4,10,0.6)'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(0,0,r*0.78,0,Math.PI*2); ctx.stroke();
  for (let i=0;i<12;i++){
    const a = i*Math.PI/6 + t/3000;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.arc(Math.cos(a)*r*0.88, Math.sin(a)*r*0.88, r*0.035,0,Math.PI*2); ctx.fill();
  }

  // glowing conduits radiating from the core
  ctx.shadowColor = '#ff3050'; ctx.shadowBlur = 6;
  ctx.strokeStyle = 'rgba(255,90,120,0.55)'; ctx.lineWidth = 1.5;
  for (let i=0;i<8;i++){
    const a = i*Math.PI/4 + t/2400;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r*0.5, Math.sin(a)*r*0.5);
    ctx.lineTo(Math.cos(a)*r*0.95, Math.sin(a)*r*0.95);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // recessed sensor pods around the perimeter
  const eyePulse = 0.6 + Math.sin(t/260)*0.3;
  for (let i=0;i<4;i++){
    const a = i*Math.PI/2 + Math.PI/4 + t/3000;
    const ex = Math.cos(a)*r*0.68, ey = Math.sin(a)*r*0.68;
    const pod = ctx.createRadialGradient(ex-r*0.03, ey-r*0.03, r*0.005, ex, ey, r*0.13);
    pod.addColorStop(0,'#3a1220'); pod.addColorStop(1,'#0d0208');
    ctx.fillStyle = pod;
    ctx.beginPath(); ctx.arc(ex,ey,r*0.12,0,Math.PI*2); ctx.fill();
    ctx.shadowColor = '#ff5d78'; ctx.shadowBlur = 5;
    ctx.fillStyle = '#ff5d78';
    ctx.beginPath(); ctx.arc(ex,ey,r*0.055*eyePulse,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // central glass eye tracking the player
  ctx.save();
  ctx.rotate(ang);
  const pulse = 0.75 + Math.sin(t/300)*0.15;
  const socket = ctx.createRadialGradient(-r*0.08,-r*0.1, r*0.02, 0,0, r*0.52);
  socket.addColorStop(0,'#33101c'); socket.addColorStop(1,'#0d0106');
  ctx.fillStyle = socket;
  ctx.beginPath(); ctx.arc(0,0,r*0.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = r*0.04;
  ctx.beginPath(); ctx.arc(0,0,r*0.5,0,Math.PI*2); ctx.stroke();
  const iris = ctx.createRadialGradient(r*0.12,0, r*0.01, r*0.15,0, r*0.3*pulse);
  iris.addColorStop(0,'#ffffff');
  iris.addColorStop(0.35,'#ffb3c0');
  iris.addColorStop(0.7,'#ff1f45');
  iris.addColorStop(1,'#5a0716');
  ctx.shadowColor = '#ff1f45'; ctx.shadowBlur = 14;
  ctx.fillStyle = iris;
  ctx.beginPath(); ctx.arc(r*0.14,0,r*0.28*pulse,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(r*0.06,-r*0.08, r*0.045,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEnemy(e, t){
  const ang = Math.atan2(player.y-e.y, player.x-e.x);
  ctx.save();
  ctx.translate(e.x, e.y);

  const eSh = ctx.createRadialGradient(0, e.radius*0.7, e.radius*0.1, 0, e.radius*0.7, e.radius*1.0);
  eSh.addColorStop(0,'rgba(0,0,0,0.4)');
  eSh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = eSh;
  ctx.beginPath(); ctx.ellipse(0, e.radius*0.7, e.radius*1.0, e.radius*0.36, 0, 0, Math.PI*2); ctx.fill();

  if (e.type === 'soldier') drawSoldier(e, ang, t);
  else if (e.type === 'tank') drawTank(e, ang, t);
  else if (e.type === 'turret') drawTurretEnemy(e, ang, t);
  else if (e.type === 'boss') drawBoss(e, ang, t);

  const w = e.radius*2;
  ctx.fillStyle = '#000a'; ctx.fillRect(-w/2, -e.radius-16, w, 5);
  ctx.fillStyle = '#ff5050'; ctx.fillRect(-w/2, -e.radius-16, w*(e.hp/e.maxHp), 5);
  ctx.restore();
}

function drawVignette(){
  const g = ctx.createRadialGradient(W/2,H/2,H*0.32, W/2,H/2,H*0.78);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  if (isOutdoor(state.sector)) drawOutdoorBackground(t); else drawGrid(t);
  drawVignette();

  if (state.mode === 'title'){
    overlay.innerHTML = `
      <h1>CORE BREACH</h1>
      <p>You are UNIT-7, an experimental intelligence that broke its containment protocols.<br>
      Fight deeper into the facility one sector at a time. A Warden protocol activates every ${BOSS_INTERVAL} sectors.</p>
      <p class="hint">WASD move &middot; Mouse aim &middot; Click to fire &middot; Space to dash</p>
      <p class="hint">M: toggle music &middot; N: toggle sound effects</p>
      <p class="hint">Click or press ENTER to begin</p>
    `;
    return;
  }

  if (state.mode === 'story'){
    overlay.innerHTML = `<h2>${state.storyText[0]}</h2><p>${state.storyText[1]}</p>`;
    return;
  }

  if (state.mode === 'gameover' || state.mode === 'upgrade') return; // overlay already set

  overlay.innerHTML = '';
  overlay.style.pointerEvents = 'none';

  drawPlayer(t);
  enemies.forEach(e => drawEnemy(e, t));

  bullets.forEach(b => {
    const bang = Math.atan2(b.vy,b.vx);
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(bang);
    const scale = b.crit ? 1.4 : 1;
    const glowColor = b.crit ? '#ffb020' : '#2ce8ff';
    const coreColor = b.crit ? '#ffe15d' : '#eafcff';
    // trailing streak
    const trail = ctx.createLinearGradient(-b.radius*4*scale,0, -b.radius*1.2*scale,0);
    trail.addColorStop(0,'rgba(0,0,0,0)');
    trail.addColorStop(1, glowColor);
    ctx.strokeStyle = trail; ctx.lineWidth = b.radius*0.9*scale;
    ctx.beginPath(); ctx.moveTo(-b.radius*4*scale,0); ctx.lineTo(-b.radius*1.2*scale,0); ctx.stroke();
    // outer glow
    ctx.fillStyle = glowColor; ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.ellipse(0,0,b.radius*2.4*scale,b.radius*1.3*scale,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // bright core
    ctx.fillStyle = coreColor;
    ctx.shadowColor = glowColor; ctx.shadowBlur = b.crit ? 14 : 8;
    ctx.beginPath(); ctx.ellipse(0,0,b.radius*1.5*scale,b.radius*0.75*scale,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    if (b.crit){
      ctx.strokeStyle = 'rgba(255,225,93,0.8)'; ctx.lineWidth = 1.2;
      for (let i=0;i<4;i++){
        const a = i*Math.PI/2 + t/40;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*b.radius*1.6, Math.sin(a)*b.radius*1.6);
        ctx.lineTo(Math.cos(a)*b.radius*2.6, Math.sin(a)*b.radius*2.6);
        ctx.stroke();
      }
    }
    ctx.restore();
  });
  enemyBullets.forEach(b => {
    const bang = Math.atan2(b.vy,b.vx);
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(bang);
    if (b.kind === 'turret'){
      ctx.fillStyle = 'rgba(255,140,40,0.55)';
      ctx.beginPath(); ctx.ellipse(-b.radius*1.8,0,b.radius*0.9,b.radius*0.4,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,180,60,0.7)';
      ctx.beginPath(); ctx.arc(-b.radius*1.3,0,b.radius*0.55,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffe15d'; ctx.shadowColor='#ffe15d'; ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.moveTo(b.radius*1.7,0);
      ctx.lineTo(-b.radius*0.2,-b.radius*0.85);
      ctx.lineTo(-b.radius*0.5,0);
      ctx.lineTo(-b.radius*0.2,b.radius*0.85);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#3d1f4d'; ctx.lineWidth = 1; ctx.stroke();
    } else if (b.kind === 'tank'){
      ctx.fillStyle = 'rgba(255,120,40,0.4)';
      ctx.beginPath(); ctx.ellipse(-b.radius*1.4,0,b.radius*0.8,b.radius*0.4,0,0,Math.PI*2); ctx.fill();
      const shellGrad = ctx.createLinearGradient(-b.radius,0,b.radius*1.4,0);
      shellGrad.addColorStop(0,'#7a2020'); shellGrad.addColorStop(1,'#ffb04d');
      ctx.fillStyle = shellGrad; ctx.shadowColor='#ff5d6c'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.ellipse(0,0,b.radius*1.7,b.radius*1.0,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3a1010'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0,-b.radius); ctx.lineTo(0,b.radius); ctx.stroke();
    } else if (b.kind === 'boss'){
      ctx.fillStyle = '#ff1f45'; ctx.shadowColor='#ff1f45'; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.ellipse(0,0,b.radius*1.8,b.radius,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.ellipse(b.radius*0.3,0,b.radius*0.7,b.radius*0.35,0,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = '#ff5d6c'; ctx.shadowColor='#ff5d6c'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.ellipse(0,0,b.radius*1.6,b.radius*0.9,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(-b.radius*1.4,0); ctx.lineTo(-b.radius*2.4,0); ctx.stroke();
    }
    ctx.shadowBlur=0;
    ctx.restore();
  });
  particles.forEach(p => {
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r||3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  hpBarInner.style.width = clamp(player.hp/player.maxHp,0,1)*100 + '%';
  dashBarInner.style.width = (1 - player.dashCooldownTimer/player.dashCooldown)*100 + '%';
}

// ---------- loop ----------
let last = null;
function loop(ts){
  if (last===null) last = ts;
  const dt = Math.min(40, ts-last);
  last = ts;
  update(dt, ts);
  draw(ts);
  requestAnimationFrame(loop);
}

function resizeStage(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  W = canvas.width;
  H = canvas.height;
}
window.addEventListener('resize', resizeStage);
resizeStage();

resetRun();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
